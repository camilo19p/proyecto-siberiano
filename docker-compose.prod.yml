version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: siberiano-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: siberiano
      POSTGRES_PASSWORD: ${DB_PASSWORD:-siberiano_secure_2024}
      POSTGRES_DB: siberiano
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siberiano"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Backend
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: siberiano-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://siberiano:${DB_PASSWORD:-siberiano_secure_2024}@db:5432/siberiano
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      PORT: 3001
      NODE_ENV: production
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend (opcional - también puede servirse desde Vercel)
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: siberiano-web
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      VITE_API_URL: http://api:3001/api
    depends_on:
      - api

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: siberiano-network
